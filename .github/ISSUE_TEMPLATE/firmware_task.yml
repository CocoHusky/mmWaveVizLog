name: Firmware task
description: Track an embedded software or protocol implementation task.
title: "firmware: "
labels: ["firmware"]
body:
  - type: dropdown
    id: path
    attributes:
      label: Firmware path
      options:
        - Zephyr runtime
        - Arduino quickstart
        - Shared protocol/schema
        - CI/release
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be added or changed?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Parser test updated
        - [ ] Firmware builds
        - [ ] Schema/example updated if needed
    validations:
      required: true
  - type: input
    id: requirement
    attributes:
      label: Requirement reference
      placeholder: REQ-SW-001 or N/A
    validations:
      required: false
