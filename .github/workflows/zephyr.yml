name: Zephyr CI

on:
  push:
  pull_request:

env:
  APP_PATH: zephyr/mr60bha2_console
  BOARD: xiao_esp32c6/esp32c6/hpcore
  FIRMWARE_BUILD_DIR: build/firmware
  TEST_PATH: zephyr/mr60bha2_console/tests/mr60bha2_parser
  ZEPHYR_REVISION: main
  ZEPHYR_WORKSPACE: zephyr/workspace
  ZEPHYR_SDK_VERSION: "1.0.1"

jobs:
  zephyr:
    name: Parser, Twister, and schema validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache \
            cmake \
            device-tree-compiler \
            file \
            g++ \
            g++-multilib \
            gcc \
            gcc-multilib \
            gperf \
            libmagic1 \
            libsdl2-dev \
            make \
            ninja-build \
            wget \
            xz-utils

          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user west jsonschema
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "ZEPHYR_SDK_INSTALL_DIR=$RUNNER_TEMP/zephyr-sdk" >> "$GITHUB_ENV"

      - name: Initialize Zephyr workspace
        run: |
          west init "$ZEPHYR_WORKSPACE" \
            -m https://github.com/zephyrproject-rtos/zephyr \
            --mr "$ZEPHYR_REVISION"

      - name: Update Zephyr workspace
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}
        run: |
          west update
          west zephyr-export
          python3 -m pip install --user -r zephyr/scripts/requirements.txt

      - name: Install Zephyr SDK host tools
        run: |
          west sdk install \
            --version "$ZEPHYR_SDK_VERSION" \
            -T \
            -d "$ZEPHYR_SDK_INSTALL_DIR"
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}

      - name: Build parser tests
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}
        run: |
          west build \
            -p always \
            -b native_sim \
            "$GITHUB_WORKSPACE/$TEST_PATH" \
            -d "$GITHUB_WORKSPACE/build/parser-tests"

      - name: Run parser tests
        run: |
          "$GITHUB_WORKSPACE/build/parser-tests/zephyr/zephyr.exe"

      - name: Run Twister
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}
        run: |
          west twister \
            -T "$GITHUB_WORKSPACE/$APP_PATH/tests" \
            --platform native_sim \
            --inline-logs \
            --outdir "$GITHUB_WORKSPACE/build/twister"

      - name: Validate JSON schema examples
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          schema_path = Path("protocol/sample.schema.json")
          example_paths = sorted(Path("protocol/examples").glob("*.json"))

          if not schema_path.exists():
              raise SystemExit(f"Schema file not found: {schema_path}")

          if not example_paths:
              raise SystemExit("No JSON examples found under protocol/examples")

          schema = json.loads(schema_path.read_text())
          validator = jsonschema.Draft202012Validator(schema)

          for example_path in example_paths:
              data = json.loads(example_path.read_text())
              errors = sorted(
                  validator.iter_errors(data),
                  key=lambda error: list(error.path),
              )

              if errors:
                  for error in errors:
                      location = ".".join(str(part) for part in error.path) or "<root>"
                      print(f"{example_path}:{location}: {error.message}")
                  raise SystemExit(1)

          print(f"Validated {len(example_paths)} JSON example(s)")
          PY

  firmware:
    name: Build XIAO ESP32-C6 firmware
    runs-on: ubuntu-latest
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache \
            cmake \
            device-tree-compiler \
            file \
            g++ \
            gcc \
            gperf \
            libmagic1 \
            libsdl2-dev \
            make \
            ninja-build \
            wget \
            xz-utils
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user west
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "ZEPHYR_SDK_INSTALL_DIR=$RUNNER_TEMP/zephyr-sdk" >> "$GITHUB_ENV"

      - name: Initialize Zephyr workspace
        run: |
          west init "$ZEPHYR_WORKSPACE" \
            -m https://github.com/zephyrproject-rtos/zephyr \
            --mr "$ZEPHYR_REVISION"

      - name: Install Zephyr Python dependencies
        run: |
          west update
          west zephyr-export
          python3 -m pip install --user -r zephyr/scripts/requirements.txt
          west packages pip --install
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}

      - name: Install Zephyr SDK
        run: |
          west sdk install \
            --version "$ZEPHYR_SDK_VERSION" \
            -t riscv64-zephyr-elf \
            -d "$ZEPHYR_SDK_INSTALL_DIR"
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}

      - name: Build firmware
        run: |
          west build \
            -b "$BOARD" \
            "$GITHUB_WORKSPACE/$APP_PATH" \
            -d "$GITHUB_WORKSPACE/$FIRMWARE_BUILD_DIR"
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}

      - name: Verify signed firmware artifact
        run: |
          test -f "$FIRMWARE_BUILD_DIR/zephyr/zephyr.signed.bin"

      - name: Upload signed firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiao-esp32c6-zephyr-signed-bin
          path: ${{ env.FIRMWARE_BUILD_DIR }}/zephyr/zephyr.signed.bin
          if-no-files-found: error
