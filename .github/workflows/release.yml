name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  APP_PATH: zephyr/mmwavevizlog-runtime
  BOARD: xiao_esp32c6/esp32c6/hpcore
  FIRMWARE_BUILD_DIR: build/firmware
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  TEST_PATH: zephyr/mmwavevizlog-runtime/tests/mr60bha2_parser
  ZEPHYR_REVISION: main
  ZEPHYR_WORKSPACE: zephyr/workspace
  ZEPHYR_SDK_VERSION: "1.0.1"

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache \
            cmake \
            device-tree-compiler \
            file \
            g++ \
            g++-multilib \
            gcc \
            gcc-multilib \
            gperf \
            libmagic1 \
            libsdl2-dev \
            make \
            ninja-build \
            wget \
            xz-utils \
            zip

          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user west jsonschema esptool
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Initialize Zephyr workspace
        run: |
          west init "$ZEPHYR_WORKSPACE" \
            -m https://github.com/zephyrproject-rtos/zephyr \
            --mr "$ZEPHYR_REVISION"

      - name: Update Zephyr workspace
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}
        run: |
          west update
          west zephyr-export
          python3 -m pip install --user -r zephyr/scripts/requirements.txt

      - name: Build native_sim parser test
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: host
        run: |
          west build \
            -p always \
            -b native_sim \
            "$GITHUB_WORKSPACE/$TEST_PATH" \
            -d "$GITHUB_WORKSPACE/build/parser-tests"

      - name: Run native_sim parser test
        run: |
          "$GITHUB_WORKSPACE/build/parser-tests/zephyr/zephyr.exe"

      - name: Validate JSON schema examples
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          schema_path = Path("protocol/sample.schema.json")
          example_paths = sorted(Path("protocol/examples").glob("*.json"))

          if not schema_path.exists():
              raise SystemExit(f"Schema file not found: {schema_path}")

          if not example_paths:
              raise SystemExit("No JSON examples found under protocol/examples")

          schema = json.loads(schema_path.read_text())
          validator = jsonschema.Draft202012Validator(schema)

          for example_path in example_paths:
              data = json.loads(example_path.read_text())
              errors = sorted(
                  validator.iter_errors(data),
                  key=lambda error: list(error.path),
              )

              if errors:
                  for error in errors:
                      location = ".".join(str(part) for part in error.path) or "<root>"
                      print(f"{example_path}:{location}: {error.message}")
                  raise SystemExit(1)

          print(f"Validated {len(example_paths)} JSON example(s)")
          PY

      - name: Fetch Espressif binary blobs
        run: |
          west blobs fetch hal_espressif
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}

      - name: Install Zephyr SDK
        run: |
          west sdk install \
            --version "$ZEPHYR_SDK_VERSION" \
            -t riscv64-zephyr-elf \
            -d "$RUNNER_TEMP/zephyr-sdk"

          SDK_CONFIG="$(find "$RUNNER_TEMP/zephyr-sdk" -type f \( \
            -name 'Zephyr-sdkConfig.cmake' -o \
            -name 'Zephyr-sdk-config.cmake' -o \
            -name 'zephyr-sdk-config.cmake' \
          \) -print -quit)"

          if [ -z "$SDK_CONFIG" ]; then
            echo "Could not locate Zephyr SDK CMake package under $RUNNER_TEMP/zephyr-sdk" >&2
            exit 1
          fi

          SDK_ROOT="$(dirname "$(dirname "$(dirname "$SDK_CONFIG")")")"
          echo "ZEPHYR_SDK_INSTALL_DIR=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "Zephyr SDK installed at $SDK_ROOT"
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}

      - name: Build XIAO ESP32-C6 firmware
        working-directory: ${{ env.ZEPHYR_WORKSPACE }}
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        run: |
          west build \
            -p always \
            -b "$BOARD" \
            "$GITHUB_WORKSPACE/$APP_PATH" \
            -d "$GITHUB_WORKSPACE/$FIRMWARE_BUILD_DIR"

      - name: Verify signed firmware artifact
        run: |
          test -f "$FIRMWARE_BUILD_DIR/zephyr/zephyr.signed.bin"

      - name: Package release artifacts
        run: |
          mkdir -p release

          cp "$FIRMWARE_BUILD_DIR/zephyr/zephyr.signed.bin" \
            "release/mmwavevizlog-xiao-esp32c6-${RELEASE_TAG}.signed.bin"

          cp "$FIRMWARE_BUILD_DIR/zephyr/zephyr.elf" \
            "release/mmwavevizlog-xiao-esp32c6-${RELEASE_TAG}.elf"

          cp "$FIRMWARE_BUILD_DIR/zephyr/zephyr.map" \
            "release/mmwavevizlog-xiao-esp32c6-${RELEASE_TAG}.map"

          cp "$GITHUB_WORKSPACE/build/parser-tests/zephyr/zephyr.exe" \
            "release/mmwavevizlog-parser-native_sim-${RELEASE_TAG}.exe"

          cp protocol/sample.schema.json \
            "release/mmwavevizlog-sample-schema-${RELEASE_TAG}.json"

          zip -r \
            "release/mmwavevizlog-protocol-examples-${RELEASE_TAG}.zip" \
            protocol/examples

          cat > release/RELEASE_NOTES.txt <<EOF
          mmWaveVizLog ${RELEASE_TAG}

          Included artifacts:
          - XIAO ESP32-C6 signed Zephyr firmware binary
          - XIAO ESP32-C6 Zephyr ELF and map files
          - Native simulator parser executable
          - Protocol JSON schema
          - Protocol JSON examples

          Built from commit:
          ${GITHUB_SHA}
          EOF

          ls -lah release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mmwavevizlog-release-${{ env.RELEASE_TAG }}
          path: release/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: mmWaveVizLog ${{ env.RELEASE_TAG }}
          body_path: release/RELEASE_NOTES.txt
          files: release/*
